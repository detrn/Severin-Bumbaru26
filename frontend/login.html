<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Galati City</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="text/javascript" src="js/api.js" defer></script>
  <script src="js/events.js" defer></script>
  <script src="js/main.js" defer></script>
</head>
<body>

<video autoplay muted loop id="myVideo">
  <source src="../assets/VIDEO.mp4" type="video/mp4">
</video>

<div class="wrapper">
  <h1>Sign In</h1>
  <p id="mesaj-eroare"></p>

  <form id="form-login">
    <div>
      <label for="email"><i data-lucide="at-sign"></i></label>
      <input id="email" type="email" name="email" placeholder="Email">
    </div>
    <div>
      <label for="parola"><i data-lucide="key-round"></i></label>
      <input id="parola" type="password" name="password" placeholder="Password">
    </div>
    <button type="submit">Sign In</button>
    <button type="button" class="guess" onclick="IntraCaOaspete()">Enter as Guest</button>
  </form>

  <p>New here? <a href="signup.html">Create an Account</a></p>
</div>

<script>lucide.createIcons();</script>
<script src="js/accessibility.js"></script>

</body>
</html>
