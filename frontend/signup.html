<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://unpkg.com/lucide@latest"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="text/javascript" src="js\validation.js" defer></script>

</head>
<body>


<div class="wrapper">
    <h1>Sign Up</h1>
    <p id="error-message"> </p>
    <form id="form">
        <div>
            <label for="firstname_input">
                <i data-lucide="user-round"></i>              </label>
            <input  type="text" name="firstname" id="firstname_input" placeholder="FirstName">
        </div>
        <div>
            <label for="email_input">
                <i data-lucide="at-sign"></i>
            </label>
            <input type="email" name="email" id="email_input" placeholder="Email">
        </div>
        <div>
            <label for="password_input">
                <i data-lucide="key-round"></i>
            </label>
            <input type="password" name="password" id="password_input" placeholder="Password">
        </div>
        <div>
            <label for="repeat_password_input">
                <i data-lucide="rotate-ccw-key"></i>
            </label>
            <input type="password" name="repeat-password" id="repeat_password_input" placeholder="Repeat-Password">
        </div>
        <button type="submit">Signup</button>
    </form>
    <p>Already have an account <a href="login.html">login</a></p>
    <video autoplay muted loop id="myVideo">
        <source src="../assets/VIDEO.mp4" type="video/mp4">
    </video>
</div>
<script>
    lucide.createIcons();
</script>
</body>
</html>
